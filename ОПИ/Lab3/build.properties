# ============================================================
#  build.properties — все переменные и константы сборки
#  Проект: Lab3 Coordinate Check (Jakarta EE + JSF + JPA)
# ============================================================

# --- Мета-информация проекта ---
project.name=CoordinateCheck
project.version=1.0.0
project.main.class=org.coordinate.bean.PointBean

# --- Директории исходников ---
src.dir=src/main/java
resources.dir=src/main/resources
webapp.dir=src/main/webapp

# --- Директории вывода ---
build.dir=build
classes.dir=${build.dir}/classes
dist.dir=${build.dir}/dist
test.dir=${build.dir}/test
test.classes.dir=${test.dir}/classes
test.reports.dir=${test.dir}/reports

# --- JAR-архив ---
jar.name=${project.name}-${project.version}.jar
jar.file=${dist.dir}/${jar.name}

# --- Тесты ---
test.src.dir=src/test/java

# --- Зависимости (путь к библиотекам) ---
lib.dir=lib
# Jakarta EE / WildFly provided libs
lib.compile=${lib.dir}/compile
# JUnit libs
lib.test=${lib.dir}/test

# --- Classpath-строка для компиляции ---
compile.classpath=${lib.compile}

# --- JUnit ---
junit.jar=${lib.test}/junit-platform-console-standalone.jar
junit.fork=true
junit.forkmode=once

# --- Git ---
git.cmd=git

# --- Music (для target music) ---
# Путь к mp3/wav файлу для воспроизведения после сборки
music.file=resources/build-complete.wav
# Команда воспроизведения (Linux: aplay/mpg123, macOS: afplay, Windows: wmplayer)
# Определяется автоматически через условие в build.xml
music.cmd.linux=aplay
music.cmd.mac=afplay
music.cmd.windows=wmplayer

# --- MANIFEST ---
manifest.vendor=ITMO University
manifest.title=${project.name}