limit: 2000
memory_size: 1024

memory_mapped_io:
  # Input: 'AAABBBBCCCC\n'
  0x80: [65, 65, 65, 66, 66, 66, 66, 67, 67, 67, 67, 10]
  0x84: []

reports:
  - name: "Execution trace"
    slice: all
    view: |
      {pc:hex}: {instruction}

  - name: "Result -- AAABBBBCCCC"
    slice: last
    view: |
      output: {io:0x84:sym}
    assert: |
      output: [] >>> [51, 65, 52, 66, 52, 67]