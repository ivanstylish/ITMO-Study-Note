<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Консультант по аппроксимации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        body {
            background: #1e3a5f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-card {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: #0a2647;
            color: white;
            padding: 24px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .header p {
            color: #a3c6ff;
            font-size: 15px;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 24px;
            background: #f8fafd;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            white-space: pre-wrap;
        }
        .assistant-message {
            background: #e9f0fa;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #0a2647;
        }
        .user-message {
            background: #0a2647;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .system-message {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            align-self: flex-start;
            color: #856404;
            font-style: italic;
        }
        .correct-message {
            background: #d4edda;
            border-left: 4px solid #28a745;
            align-self: flex-start;
            color: #155724;
        }
        .wrong-message {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            align-self: flex-start;
            color: #721c24;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dde3ed;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        textarea {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            border: 2px solid #dde3ed;
            border-radius: 24px;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: #0a2647;
        }
        button {
            background: #0a2647;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 0 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            height: 48px;
        }
        button:hover {
            background: #1e3a5f;
        }
        button.secondary {
            background: #6c757d;
        }
        button.secondary:hover {
            background: #5a6268;
        }
        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer {
            padding: 12px 24px;
            background: #f0f5fa;
            color: #2c3e50;
            font-size: 13px;
            border-top: 1px solid #d0ddee;
        }
    </style>
</head>
<body>
    <div class="chat-card">
        <div class="header">
            <h1>🧑‍🏫 Консультант по аппроксимации</h1>
            <p>Квадратичная (Пауэлла) и кубическая интерполяция • Диалоговый разбор • Подготовка к лабораторной</p>
        </div>
        
        <div id="messages" class="messages">
            <!-- Сообщения будут добавляться сюда -->
        </div>
        
        <div class="input-area">
            <textarea id="userInput" placeholder="Ваш ответ..." rows="2"></textarea>
            <div class="button-group">
                <button id="sendBtn">Отправить</button>
                <button id="showAnswerBtn" class="secondary">Показать правильный ответ</button>
            </div>
        </div>
        
        <div class="footer">
            💬 Сценарий: понятие → уточнение → пример → типичная ошибка. 
            После своего ответа нажмите "Показать правильный ответ" для самопроверки.
        </div>
    </div>

    <script>
        (function() {
            // Элементы
            const messagesDiv = document.getElementById('messages');
            const inputField = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const showAnswerBtn = document.getElementById('showAnswerBtn');
            
            // Сценарий консультации с правильными ответами
            const steps = [
                {
                    text: "👋 Здравствуйте! Это консультация по материалам лекции о методах полиномиальной аппроксимации.\n\n**Вопрос 1:** Чем принципиально отличаются квадратичная и кубическая аппроксимация? (какую информацию о функции они используют?)",
                    correctAnswer: "Квадратичная аппроксимация использует только значения функции в трёх точках, а кубическая — значения функции и её производной на двух концах отрезка (информацию о производных)."
                },
                {
                    text: "**Вопрос 2:** В кубическом методе есть условие f'(x₁)·f'(x₂) < 0. Что оно гарантирует?",
                    correctAnswer: "Это условие гарантирует, что на отрезке есть минимум (функция унимодальна), и производные на концах имеют разные знаки, значит точка минимума находится внутри интервала."
                },
                {
                    text: "**Вопрос 3:** Рассмотрим пример: f(x) = 2x² + 16/x. Начальная точка x₁ = 1, шаг Δx = 1, f(1) = 18, f(2) = 16. Куда поставим третью точку x₃?",
                    correctAnswer: "Так как f(1) > f(2), движемся вправо: x₃ = x₁ + 2Δx = 3. Это шаг 4 алгоритма: если f(x₁) > f(x₂), то x₃ = x₁ + 2Δx."
                },
                {
                    text: "**Вопрос 4:** В методе Пауэлла знаменатель формулы для x̅ может стать нулевым. Что это значит и что делать?",
                    correctAnswer: "Это значит, что три точки лежат на одной прямой (парабола вырождается). Тогда берут лучшую точку (с минимальным значением функции) и уменьшают шаг, либо переходят к шагу 2 с новой точкой."
                },
                {
                    text: "**Вопрос 5 (задача):** Даны точки x₁=2, x₂=4, x₃=6 и значения f₁=10, f₂=2, f₃=10. Найдите приближение x̅ по формуле метода квадратичной аппроксимации.",
                    correctAnswer: "x̅ = 4.0\n\nРешение:\nЧислитель: (16-36)·10 + (36-4)·2 + (4-16)·10 = -200 + 64 -120 = -256\nЗнаменатель: (4-6)·10 + (6-2)·2 + (2-4)·10 = -20 + 8 -20 = -32\nx̅ = 0.5 · (-256)/(-32) = 0.5 · 8 = 4.0"
                },
                {
                    text: "**Вопрос 6:** В кубической аппроксимации что означает параметр μ и в каких пределах он находится?",
                    correctAnswer: "μ — это доля шага от x₁ к x₂: x₀ = x₁ + μ(x₂−x₁). Доказано, что μ ∈ (0,1), то есть новая точка всегда находится строго внутри исходного отрезка."
                },
                {
                    text: "**Вопрос 7:** Какие критерии остановки используются в квадратичном и кубическом методах?",
                    correctAnswer: "В квадратичном методе: |Fmin−f(x̅)|/f(x̅) < ε₁ и |xmin−x̅|/x̅ < ε₂. В кубическом методе: |f'(x₀)| < ε (производная в найденной точке близка к нулю)."
                },
                {
                    text: "🎉 Консультация завершена! Вы разобрали основные моменты. Для закрепления решите пример из презентации до конца (слайды 10-15).",
                    correctAnswer: "Спасибо за работу!"
                }
            ];
            
            let currentStep = 0;
            let lastUserAnswer = "";
            
            // Функция добавления сообщения
            function addMessage(text, type = 'assistant') {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${type}-message`;
                msgDiv.innerHTML = text.replace(/\n/g, '<br>');
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
            
            // Функция отправки сообщения ассистента
            function sendAssistantMessage(stepIndex) {
                if (stepIndex < steps.length) {
                    addMessage(steps[stepIndex].text, 'assistant');
                } else {
                    addMessage("Консультация завершена. Обновите страницу, чтобы начать заново.", 'assistant');
                }
            }
            
            // Проверка ответа (очень простая, можно расширить)
            function checkAnswer(userText, correctAnswer) {
                // Убираем лишние пробелы и приводим к нижнему регистру для сравнения
                const userClean = userText.toLowerCase().trim();
                const correctClean = correctAnswer.toLowerCase().trim();
                
                // Простейшая проверка - если ответ пользователя содержит ключевые слова из правильного ответа
                // Это очень упрощенная логика, в реальности можно сделать лучше
                const keywords = correctClean.split(' ').filter(word => word.length > 4);
                let matchCount = 0;
                for (let keyword of keywords) {
                    if (userClean.includes(keyword)) matchCount++;
                }
                
                if (matchCount >= 2 || userClean.includes(correctClean.substring(0, 20))) {
                    return true;
                }
                return false;
            }
            
            // Обработка ответа пользователя
            function handleUserResponse() {
                const userText = inputField.value.trim();
                if (userText === '') return;
                
                // Сохраняем ответ
                lastUserAnswer = userText;
                
                // Показываем сообщение пользователя
                addMessage(userText, 'user');
                inputField.value = '';
                
                // Получаем правильный ответ для текущего шага
                const correctAns = steps[currentStep].correctAnswer;
                
                // Проверяем ответ
                const isCorrect = checkAnswer(userText, correctAns);
                
                // Даем обратную связь без слов "верно/правильно" автоматически
                if (isCorrect) {
                    addMessage("✓ Ваш ответ принят. Нажмите 'Показать правильный ответ' чтобы свериться с эталоном.", 'system');
                } else {
                    addMessage("ℹ️ Ответ записан. Вы можете посмотреть правильный ответ, нажав соответствующую кнопку.", 'system');
                }
            }
            
            // Показать правильный ответ
            function showCorrectAnswer() {
                if (currentStep < steps.length) {
                    const correctAns = steps[currentStep].correctAnswer;
                    addMessage("📌 Правильный ответ:\n" + correctAns, 'correct');
                }
            }
            
            // Переход к следующему вопросу (по кнопке правильного ответа или отдельно)
            function nextQuestion() {
                currentStep++;
                if (currentStep < steps.length) {
                    sendAssistantMessage(currentStep);
                } else if (currentStep === steps.length) {
                    // Показываем завершающее сообщение, если оно есть
                    sendAssistantMessage(currentStep);
                }
            }
            
            // Инициализация
            window.addEventListener('load', function() {
                messagesDiv.innerHTML = '';
                sendAssistantMessage(0);
                currentStep = 0;
            });
            
            // Обработчики
            sendBtn.addEventListener('click', handleUserResponse);
            
            showAnswerBtn.addEventListener('click', function() {
                showCorrectAnswer();
                // Автоматически переходим к следующему вопросу после показа ответа
                // с небольшой задержкой
                setTimeout(() => {
                    nextQuestion();
                }, 1000);
            });
            
            inputField.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleUserResponse();
                }
            });
        })();
    </script>
</body>
</html>
